<!doctype html>
<html>
<head>
  <title>Gemini Usage</title>
</head>
<body>
  <div class="usage-card">
    <h2>Model Usage</h2>
    <div data-model="gemini-2.5-pro" class="model-row">
      <span class="model-name">Gemini 2.5 Pro</span>
      <span class="model-used">Used: <span data-used>15</span></span>
      <span class="model-limit">Limit: <span data-limit>100</span></span>
    </div>
    <div data-model="gemini-2.5-flash" class="model-row">
      <span class="model-name">Gemini 2.5 Flash</span>
      <span class="model-used">Used: <span data-used>120</span></span>
      <span class="model-limit">Limit: <span data-limit>1000</span></span>
    </div>
  </div>
</body>
</html>
